name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Apply one-time Phase 29 autofix
        run: python scripts/ci-autofix-phase29.py
      - name: Commit autofix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/application/planning-lifecycle/drizzle-repository-adapters.ts src/application/catalog.ts scripts/db-catalog-seed-smoke.ts
          if git diff --cached --quiet; then
            echo "No autofix changes to commit."
          else
            git commit -m "Fix Phase 29 Drizzle types and seed smoke"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund --loglevel=error
      - name: Typecheck
        run: npm run typecheck > typecheck.log 2>&1
      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log
      - name: Upload debug source
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-source
          path: |
            src/application/planning-lifecycle/drizzle-repository-adapters.ts
            src/application/catalog.ts
            scripts/db-catalog-seed-smoke.ts
            scripts/db-catalog-lifecycle-smoke.ts
            package.json
            package-lock.json
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
