name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund --loglevel=error
      - name: Typecheck
        run: npm run typecheck > typecheck.log 2>&1
      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log
      - name: Upload debug source
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-source
          path: |
            src/application/planning-lifecycle/drizzle-repository-adapters.ts
            src/application/catalog.ts
            scripts/db-catalog-seed-smoke.ts
            scripts/db-catalog-lifecycle-smoke.ts
            package.json
            package-lock.json
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
